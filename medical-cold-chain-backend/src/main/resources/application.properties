spring.application.name=medical-cold-chain-backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/medical_cold_chain?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai

spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.max-http-request-header-size=64KB
server.tomcat.max-swallow-size=-1
# 增大请求头大小限制（单位：KB）
server.tomcat.max-http-header-size=102400
# 同时增大请求体大小
server.tomcat.max-swallow-size=-1
server.servlet.context-parameters.maxPostSize=-1
# 跨域配置（避免额外头信息问题）
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
app.super-admin-phone=18800000000
